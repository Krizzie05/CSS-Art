<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Magician's Hat</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="container-1">
            <div class="wand" id="magic-wand">
                <div class="wand-a"></div>
                <div class="wand-b"></div>
            </div>
            <div class="floor"></div>
            
            <div class="hat">
                <div class="hat-a"></div>
                <div class="hat-b">
                    <div class="hat-ribbon"></div>
                </div>
                <div class="bunny-face">
                    <div class="bunny-ear">
                        <div class="bunny-ear-left">
                            <div class="ear-pad"></div>
                        </div>
                        <div class="bunny-ear-right">
                            <div class="ear-pad"></div>
                        </div>
                    </div>
                    <div class="eyes">
                        <div class="eye-left">
                            <div class="eye-ball"></div>
                        </div>
                        <div class="nose"></div>

                        <div class="eye-right">
                            <div class="eye-ball"></div>
                        </div>
                    </div>
                    <div class="mouth-cont">
                        <div class="mouth">
                            <div class="teeth">
                                <div class="teeth-left"></div>
                                <div class="teeth-right"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="paws">
                    <div class="paw-left">
                        <div class="paw-a"></div>
                        <div class="digits">
                            <div class="paw-b"></div>
                            <div class="paw-c"></div>
                            <div class="paw-d"></div>
                        </div>
                    </div>
                    <div class="paw-right">
                        <div class="paw-a"></div>
                        <div class="digits">
                            <div class="paw-b"></div>
                            <div class="paw-c"></div>
                            <div class="paw-d"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="box"></div>
        </div>
        <div class="container-2">
            <div class="base">
                <div class="slot-1">
                    <div class="hat-1" id="hat"></div>
                </div>
                <div class="slot-2">
                    <div class="hat-2" id="hat"></div>
                </div>
                <div class="slot-3">
                    <div class="hat-3" id="hat"></div>
                </div>
            </div>
            <div class="playbutton"><span>Play</span> </div>
            <div id="ball"></div>
        </div>
        <div class="container-3">
            <div class="box-1">
                <div class="hat-box-2">
                    <div class="hat-model">
                        <div class="hat-body">
                            <div class="hat-body-1"></div>
                            <div class="hat-body-2"></div>
                            <div class="hat-body-3"></div>
                        </div>
                        <div class="hat-rim"></div>
                    </div>
                </div>
                <div class="hand-box-2">
                    <div class="hand-model" id="model-1">
                        <div class="hand">
                            <div class="finger"></div>
                            <div class="finger"></div>
                            <div class="finger"></div>
                            <div class="finger"></div>
                        </div>
                        <div class="shirt"><div class="shirt-button"></div></div>
                        <div class="sleeve"></div>
                    </div>
                </div>
            </div>
            <div class="box-2">
                <div class="hat-box-2">
                    <div class="hat-model">
                        <div class="hat-body">
                            <div class="hat-body-1"></div>
                            <div class="hat-body-2"></div>
                            <div class="hat-body-3"></div>
                        </div>
                        <div class="hat-rim"></div>
                    </div>
                </div>
                <div class="hand-box-2">
                    <div class="hand-model" id="model-2">
                        <div class="hand">
                            <div class="finger"></div>
                            <div class="finger"></div>
                            <div class="finger"></div>
                            <div class="finger"></div>
                        </div>
                        <div class="shirt"><div class="shirt-button"></div></div>
                        <div class="sleeve"></div>
                    </div>
                </div>
            </div>
        </div>
        <script src="./script.js"></script>
    </body>
</html>
